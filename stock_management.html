<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stock Management</title>
<style>
body { font-family: Arial; background:#f5f5f5; }
.container { max-width:900px; margin:auto; padding:20px; }
.card { background:#fff; padding:15px; margin:10px 0; border-radius:8px; }
input { padding:8px; margin:5px; }
button { padding:10px 15px; cursor:pointer; }
</style>
</head>
<body>

<div class="container">

<h2>Stock Management</h2>

<!-- STOCK IN -->
<div class="card">
<h3>Stock In</h3>

<select id="item-in"></select>
<input type="text" id="new-item-in" placeholder="New Item Name" style="display:none"/>
<input type="number" id="qty-in" placeholder="Quantity"/>
<button onclick="submitStock('in')">Add Stock</button>

</div>

<!-- STOCK OUT -->
<div class="card">
<h3>Stock Out</h3>

<select id="item-out"></select>
<input type="text" id="new-item-out" placeholder="New Item Name" style="display:none"/>

<input type="number" id="qty-out" placeholder="Quantity"/>
<input type="text" id="branch" placeholder="Branch Name"/>

<button onclick="submitStock('out')">Consume Stock</button>

</div>

<!-- DASHBOARD -->
<div class="card">
<h3>Current Balance</h3>
<div id="dashboard"></div>
</div>

<!-- REPORT -->
<div class="card">
<h3>Report</h3>
<table border="1" width="100%">
<thead>
<tr>
<th>Date</th><th>Item</th><th>Type</th>
<th>Qty In</th><th>Qty Out</th>
<th>Branch</th><th>Balance</th>
</tr>
</thead>
<tbody id="report"></tbody>
</table>
</div>

</div>

<script>

/* 🔗 GOOGLE SCRIPT URL */
const API = "https://script.google.com/macros/s/AKfycbzD9n9cCRnbRIogzc3yvL4AUVNSSSv2RHkXT7rrVwh_rWfegxYRB8-WppmF01nvMsgwbA/exec";

/* 📦 ITEMS */
let ITEMS = [
  "Rice – Tajmahala",
  "Rice – Pusagold",
  "Rice – Finest",
  "Oil","Milk","Ghee","Vegetables"
];

/* 🔄 INIT */
function init() {
  renderDropdowns();
  loadDashboard();
  loadReport();
}
init();

/* 🧩 DROPDOWN */
function renderDropdowns() {
  const opts = ITEMS.map(i=>`<option>${i}</option>`).join("") +
               `<option value="NEW">+ Add New Item</option>`;

  document.getElementById("item-in").innerHTML = opts;
  document.getElementById("item-out").innerHTML = opts;

  document.getElementById("item-in").onchange = e=>{
    document.getElementById("new-item-in").style.display =
      e.target.value==="NEW"?"block":"none";
  };

  document.getElementById("item-out").onchange = e=>{
    document.getElementById("new-item-out").style.display =
      e.target.value==="NEW"?"block":"none";
  };
}

/* 🚀 SUBMIT */
async function submitStock(type) {

  let item = document.getElementById(`item-${type}`).value;
  let newItem = document.getElementById(`new-item-${type}`).value;
  let qty = parseFloat(document.getElementById(`qty-${type}`).value);

  if (item==="NEW") {
    item = newItem;
    if (!ITEMS.includes(item)) ITEMS.push(item);
    renderDropdowns();
  }

  if (!qty || qty<=0) return alert("Enter quantity");

  // 🔥 CHECK STOCK BEFORE OUT
  if (type==="out") {
    const ok = await checkStock(item, qty);
    if (!ok) {
      alert("❌ Not enough stock. Add Stock In");
      return;
    }
  }

  const res = await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"append",
      rows:[[
        new Date().toISOString(),
        item,
        type==="in"?"Stock In":"Stock Out",
        type==="in"?qty:"",
        type==="out"?qty:"",
        new Date().toISOString(),
        document.getElementById("branch").value || "",
        ""
      ]]
    })
  });

  alert("Saved!");

  loadDashboard();
  loadReport();
}

/* 📊 DASHBOARD */
async function loadDashboard() {
  const res = await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"getDashboard"})
  });

  const data = await res.json();
  const b = data.balances;

  document.getElementById("dashboard").innerHTML =
    Object.keys(b).map(k=>`<div>${k}: <b>${b[k]}</b></div>`).join("");
}

/* 📋 REPORT */
async function loadReport() {
  const res = await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"getData"})
  });

  const data = await res.json();

  document.getElementById("report").innerHTML =
    data.data.slice(1).map(r=>`
      <tr>
        <td>${r[0]}</td>
        <td>${r[1]}</td>
        <td>${r[2]}</td>
        <td>${r[3]}</td>
        <td>${r[4]}</td>
        <td>${r[6]}</td>
        <td>${r[7]}</td>
      </tr>
    `).join("");
}

/* 🚫 NEGATIVE CHECK */
async function checkStock(item, qty) {
  const res = await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"getDashboard"})
  });

  const data = await res.json();
  return (data.balances[item] || 0) >= qty;
}

</script>
</body>
</html>
