<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stock Management</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
.container { max-width:1000px; margin:auto; padding:15px; }
.header { background:#333; color:#fff; padding:15px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; }
.card { background:#fff; padding:12px; border-radius:10px; }
input, select { width:100%; padding:6px; margin-top:5px; }
button { padding:10px; background:#333; color:#fff; border:none; cursor:pointer; margin-top:10px; }
</style>

</head>
<body>

<div class="header">
  <h2>Stock Management</h2>
</div>

<div class="container">

  <h3>Stock Entry</h3>

  <select id="type">
    <option value="in">Stock In</option>
    <option value="out">Stock Out</option>
  </select>

  <div id="grid" class="grid"></div>

  <button onclick="submitStock()">Submit</button>

  <p id="msg"></p>

</div>

<script>

// 🔥 PUT YOUR GOOGLE SCRIPT URL HERE
const API_URL = "https://script.google.com/macros/s/AKfycbwhh2fUPpyoF47phocBG4aJMFPWwVE7butsSasUo_sTOZPfubgFEUtaYPapBuah2Z5jpw/exec";

// ✅ Dynamic Items
const ITEMS = [
  { id:'rice', name:'Rice', unit:'kg', options:['Tajmahala','Pusagold','Finest'] },
  { id:'oil', name:'Oil', unit:'L', options:['Sunflower','Palm'] },
  { id:'milk', name:'Milk', unit:'L', options:['Full Cream','Low Fat'] },
  { id:'ghee', name:'Ghee', unit:'kg', options:['Regular'] },
  { id:'vegetables', name:'Vegetables', unit:'kg', options:['General'] }
];

// 🔧 Build UI
function buildGrid() {
  document.getElementById('grid').innerHTML = ITEMS.map(it => `
    <div class="card">
      <b>${it.name}</b>

      <select id="opt-${it.id}">
        ${it.options.map(o => `<option>${o}</option>`).join('')}
      </select>

      <input type="number" id="qty-${it.id}" placeholder="Qty">
      <small>${it.unit}</small>
    </div>
  `).join('');
}

// 🚀 Submit
function submitStock() {

  const type = document.getElementById('type').value;
  let rows = [];

  ITEMS.forEach(it => {
    const qty = parseFloat(document.getElementById('qty-'+it.id).value);
    const opt = document.getElementById('opt-'+it.id).value;

    if (qty > 0) {
      rows.push([
        new Date().toLocaleString(),
        it.name,
        opt,
        type,
        qty,
        it.unit
      ]);
    }
  });

  if (!rows.length) {
    alert("Enter at least one item");
    return;
  }

  fetch(API_URL, {
    method: "POST",
    mode: "no-cors",   // 🔥 IMPORTANT
    body: JSON.stringify({
      action: "append",
      rows: rows
    })
  });

  document.getElementById('msg').innerText = "Saved to Google Sheet ✔";

  // clear inputs
  ITEMS.forEach(it => {
    document.getElementById('qty-'+it.id).value = "";
  });
}

// Init
buildGrid();

</script>

</body>
</html>
